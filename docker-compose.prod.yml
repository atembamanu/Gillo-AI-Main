services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api.gilloai.com}
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - api-server
    networks:
      - app_net

  api-server:
    build:
      context: ./backend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - "CORS_ORIGIN=${CORS_ORIGIN:-https://gilloai.com,https://www.gilloai.com}"
      - POSTGRES_URL=${POSTGRES_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:1b}
      - WHISPER_URL=${WHISPER_URL:-http://whisper:9000}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-http://minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET:-audio-notes}
      - MINIO_REGION=${MINIO_REGION:-us-east-1}
      - QUEUE_ATTEMPTS=${QUEUE_ATTEMPTS:-3}
    depends_on:
      - postgres
      - redis
      - minio
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
    mem_limit: 768m
    cpus: "1.0"
    networks:
      - app_net

  worker:
    build:
      context: ./worker
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - POSTGRES_URL=${POSTGRES_URL}
      - REDIS_URL=${REDIS_URL}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - WHISPER_URL=${WHISPER_URL:-http://whisper:9000}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:1b}
      - API_BASE_URL=${API_BASE_URL:-http://api-server:3000}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-http://minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET:-audio-notes}
      - MINIO_REGION=${MINIO_REGION:-us-east-1}
      - QUEUE_CONCURRENCY=${QUEUE_CONCURRENCY:-1}
    depends_on:
      - api-server
      - redis
      - whisper
      - ollama
      - minio
    mem_limit: 1024m
    cpus: "1.5"
    networks:
      - app_net

  bullmq-dashboard:
    build:
      context: ./bullmq-dashboard
    restart: unless-stopped
    environment:
      - REDIS_URL=${REDIS_URL}
      - DASHBOARD_USERNAME=${DASHBOARD_USERNAME}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD}
      - QUEUE_NAMES=${QUEUE_NAMES:-process_note}
      - PORT=3010
    depends_on:
      - redis
    expose:
      - "3010"
    networks:
      - app_net

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      - app_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - app_net

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    restart: unless-stopped
    environment:
      - ASR_MODEL=${ASR_MODEL:-base}
      - ASR_ENGINE=faster_whisper
    expose:
      - "9000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/docs"]
      interval: 30s
      timeout: 10s
      retries: 6
    mem_limit: 2048m
    cpus: "2.0"
    networks:
      - app_net

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
    expose:
      - "11434"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 6
    mem_limit: 3072m
    cpus: "2.0"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - app_net

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio_data:/data
    networks:
      - app_net

volumes:
  pgdata:
  redis_data:
  ollama_data:
  minio_data:

networks:
  app_net:
    driver: bridge
