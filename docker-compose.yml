services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - api-server
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app_net

  frontend:
    build:
      context: ./frontend
    environment:
      - VITE_API_BASE_URL=/api
    networks:
      - app_net

  api-server:
    build:
      context: ./backend
    environment:
      - POSTGRES_URL=postgres://postgres:postgres@postgres:5432/notes
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=change-me-in-prod
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:1b
      - WHISPER_URL=http://whisper:9000
    depends_on:
      - postgres
      - redis
    networks:
      - app_net

  worker:
    build:
      context: ./worker
    environment:
      - POSTGRES_URL=postgres://postgres:postgres@postgres:5432/notes
      - REDIS_URL=redis://redis:6379
      - OLLAMA_URL=http://ollama:11434
      - WHISPER_URL=http://whisper:9000
      - OLLAMA_MODEL=llama3.2:1b
      - API_BASE_URL=http://api-server:3000
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=audio-notes
    depends_on:
      - postgres
      - redis
      - ollama
      - whisper
      - minio
    networks:
      - app_net

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=notes
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app_net

  redis:
    image: redis:7-alpine
    networks:
      - app_net

  whisper:
    image: onerahmet/openai-whisper-asr-webservice
    environment:
      - ASR_MODEL=base
    ports:
      - "9000:9000"
    networks:
      - app_net

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - app_net

  minio:
    image: minio/minio:latest
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - app_net

volumes:
  pgdata:
  ollama_data:
  minio_data:

networks:
  app_net:
    driver: bridge

