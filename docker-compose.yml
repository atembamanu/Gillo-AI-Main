services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - api-server
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app_net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    networks:
      - app_net

  api-server:
    build:
      context: ./backend
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=3000
      - CORS_ORIGIN=${CORS_ORIGIN}
      - POSTGRES_URL=${POSTGRES_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - OLLAMA_URL=${OLLAMA_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - WHISPER_URL=${WHISPER_URL}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - MINIO_REGION=${MINIO_REGION}
      - QUEUE_ATTEMPTS=${QUEUE_ATTEMPTS}
    depends_on:
      - postgres
      - redis
    networks:
      - app_net

  worker:
    build:
      context: ./worker
    environment:
      - NODE_ENV=${NODE_ENV}
      - POSTGRES_URL=${POSTGRES_URL}
      - REDIS_URL=${REDIS_URL}
      - OLLAMA_URL=${OLLAMA_URL}
      - WHISPER_URL=${WHISPER_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - API_BASE_URL=${API_BASE_URL}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - MINIO_REGION=${MINIO_REGION}
      - QUEUE_CONCURRENCY=${QUEUE_CONCURRENCY}
    depends_on:
      - postgres
      - redis
      - ollama
      - whisper
      - minio
    networks:
      - app_net

  bullmq-dashboard:
    build:
      context: ./bullmq-dashboard
    environment:
      - REDIS_URL=${REDIS_URL}
      - DASHBOARD_USERNAME=${DASHBOARD_USERNAME}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD}
      - QUEUE_NAMES=${QUEUE_NAMES}
      - PORT=3010
    depends_on:
      - redis
    ports:
      - "${BULLMQ_DASHBOARD_PORT}:3010"
    networks:
      - app_net

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app_net

  redis:
    image: redis:7-alpine
    networks:
      - app_net

  whisper:
    image: onerahmet/openai-whisper-asr-webservice
    environment:
      - ASR_MODEL=${ASR_MODEL}
    ports:
      - "9000:9000"
    networks:
      - app_net

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - app_net

  minio:
    image: minio/minio:latest
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - app_net

volumes:
  pgdata:
  ollama_data:
  minio_data:

networks:
  app_net:
    driver: bridge

