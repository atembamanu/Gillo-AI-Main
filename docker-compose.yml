services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - api-server
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app_net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    networks:
      - app_net

  api-server:
    build:
      context: ./backend
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3000
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost}
      - POSTGRES_URL=${POSTGRES_URL:-postgres://postgres:postgres@postgres:5432/notes}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-prod}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:1b}
      - WHISPER_URL=${WHISPER_URL:-http://whisper:9000}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-http://minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-audio-notes}
      - MINIO_REGION=${MINIO_REGION:-us-east-1}
      - QUEUE_ATTEMPTS=${QUEUE_ATTEMPTS:-3}
    depends_on:
      - postgres
      - redis
    networks:
      - app_net

  worker:
    build:
      context: ./worker
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - POSTGRES_URL=${POSTGRES_URL:-postgres://postgres:postgres@postgres:5432/notes}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - WHISPER_URL=${WHISPER_URL:-http://whisper:9000}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:1b}
      - API_BASE_URL=${API_BASE_URL:-http://api-server:3000}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-http://minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-audio-notes}
      - MINIO_REGION=${MINIO_REGION:-us-east-1}
      - QUEUE_CONCURRENCY=${QUEUE_CONCURRENCY:-1}
    depends_on:
      - postgres
      - redis
      - ollama
      - whisper
      - minio
    networks:
      - app_net

  bullmq-dashboard:
    build:
      context: ./bullmq-dashboard
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - DASHBOARD_USERNAME=${DASHBOARD_USERNAME:-admin}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-change-me}
      - QUEUE_NAMES=${QUEUE_NAMES:-process_note}
      - PORT=3010
    depends_on:
      - redis
    ports:
      - "${BULLMQ_DASHBOARD_PORT:-3010}:3010"
    networks:
      - app_net

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-notes}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app_net

  redis:
    image: redis:7-alpine
    networks:
      - app_net

  whisper:
    image: onerahmet/openai-whisper-asr-webservice
    environment:
      - ASR_MODEL=${ASR_MODEL:-base}
    ports:
      - "9000:9000"
    networks:
      - app_net

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - app_net

  minio:
    image: minio/minio:latest
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - app_net

volumes:
  pgdata:
  ollama_data:
  minio_data:

networks:
  app_net:
    driver: bridge

